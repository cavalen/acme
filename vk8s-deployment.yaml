apiVersion: v1
kind: Secret
metadata:
  name: dockerio
data:
  .dockerconfigjson: easasdalksjdlkajjogewoxcxfgddgfduytiutiuhopijpoasdkajdjasjdlas==
type: kubernetes.io/dockerconfigjson
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-api
spec:
  selector:
    matchLabels:
      app: echo-api
  template:
    metadata:
      labels:
        app: echo-api
    spec:
      containers:
      - name: echo-app
        image: cavalen/http-https-echo:25
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 8080
      imagePullSecrets:
      - name: dockerio
---
apiVersion: v1
kind: Service
metadata:
  name: echo-api-svc
spec:
  type: ClusterIP
  selector:
    app: echo-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
